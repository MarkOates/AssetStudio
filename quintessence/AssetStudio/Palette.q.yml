properties:


  - name: raw_colors
    type: std::map<ALLEGRO_COLOR, int> 
    init_with: ''

  - name: colors
    type: std::vector<AssetStudio::Color> 
    init_with: ''

  - name: sorting
    type: AssetStudio::Palette::Sorting
    init_with: Sorting::UNDEF

  - name: tags
    type: AssetStudio::Palette::PropertyTags
    init_with: PropertyTags::UNDEF

  - name: dummy_color
    type: AssetStudio::Color
    init_with: AssetStudio::Color::build(ALLEGRO_COLOR{0.5, 0.5, 0.5, 1.0})
    static: true


enums:


  - class: PropertyTags
    enumerators:
      - UNDEF
      - HAS_ALPHA


  - class: Sorting
    enumerators:
      - UNDEF
      - ID
      - LUMINANCE


methods:


  - name: build
    static: true
    type: AssetStudio::Palette
    parameters:
      - name: bitmap
        type: ALLEGRO_BITMAP*
        default_argument: nullptr
    guards: [ bitmap, al_get_current_display() ]
    body: |
      AssetStudio::Palette result;
      ALLEGRO_COLOR pixel;

      al_lock_bitmap(bitmap, ALLEGRO_PIXEL_FORMAT_ANY, ALLEGRO_LOCK_READONLY);
      int width = al_get_bitmap_width(bitmap);
      int height = al_get_bitmap_height(bitmap);

      for (int y=0; y<height; y++)
      {
         for (int x=0; x<width; x++)
         {
            pixel = al_get_pixel(bitmap, x, y);
            result.raw_colors[pixel]++;
         }
      }

      uint32_t id = 1;
      for (auto &raw_color : result.raw_colors)
      {
         result.colors.push_back(AssetStudio::Color::build(raw_color.first));
         result.colors.back().id = id;
         id++;
      }

      al_unlock_bitmap(bitmap);

      // NOTE: Palette is implicitly ordered by reverse-luminance (from the Comparison/ALLEGRO_COLOR header). You might
      // consider ordering differently.

      return result;
    body_dependency_symbols:
      - AssetStudio::Comparison::ALLEGRO_COLOR
      - std::sort


  - name: build_indexed_bitmap_and_palette
    static: true
    type: std::pair<AssetStudio::IndexedBitmap, AssetStudio::Palette>
    parameters:
      - name: bitmap
        type: ALLEGRO_BITMAP*
        default_argument: nullptr
    guards: [ bitmap, al_get_current_display() ]
    body: |
      std::pair<AssetStudio::IndexedBitmap, AssetStudio::Palette> result_;
      AssetStudio::Palette &result = result_.second;
      AssetStudio::IndexedBitmap &result_bitmap = result_.first;

      int width = al_get_bitmap_width(bitmap);
      int height = al_get_bitmap_height(bitmap);
      result_bitmap.width = width;
      result_bitmap.height = height;
      result_bitmap.pixels.resize(width * height);

      std::map<ALLEGRO_COLOR, uint16_t> color_to_index;
      uint16_t next_id = 1; // NOTE: 0 is an error

      al_lock_bitmap(bitmap, ALLEGRO_PIXEL_FORMAT_ANY, ALLEGRO_LOCK_READONLY);

      for (int y = 0; y < height; y++)
      {
         for (int x = 0; x < width; x++)
         {
            ALLEGRO_COLOR pixel = al_get_pixel(bitmap, x, y);
            
            //  Check if color exists in our temporary map
            auto it = color_to_index.find(pixel);
            if (it == color_to_index.end())
            {
                // New color
                color_to_index[pixel] = next_id;
                result_bitmap.pixels[x + y * width] = next_id;
                
                // Store in palette result
                AssetStudio::Color new_color = AssetStudio::Color::build(pixel);
                new_color.id = next_id;
                result.colors.push_back(new_color);
                
                next_id++;
            }
            else
            {
                // Existing color
                result_bitmap.pixels[x + y * width] = it->second;
            }
            
            // Maintain initial list
            result.raw_colors[pixel]++;
         }
      }

      result_bitmap.expected_palette_size = result.colors.size();

      al_unlock_bitmap(bitmap);
      return result_;
    body_dependency_symbols:
      - AssetStudio::Comparison::ALLEGRO_COLOR
      - std::sort


  - name: create_bitmap_from_indexed_bitmap_and_palette
    static: true
    type: ALLEGRO_BITMAP*
    parameters:
      - name: indexed_bitmap_
        type: AssetStudio::IndexedBitmap*
        default_argument: nullptr
      - name: palette_
        type: AssetStudio::Palette*
        default_argument: nullptr
    guards:
      - indexed_bitmap_
      - palette_
      - (indexed_bitmap_->expected_palette_size == palette_->colors.size())
    body: |
      ALLEGRO_STATE previous_state;
      al_store_state(&previous_state, ALLEGRO_STATE_BITMAP | ALLEGRO_STATE_TARGET_BITMAP);
      auto &indexed_bitmap = *indexed_bitmap_;
      auto &palette = *palette_;

      int width = indexed_bitmap.width;
      int height = indexed_bitmap.height;

      ALLEGRO_BITMAP* result = al_create_bitmap(indexed_bitmap.width, indexed_bitmap.height);
      al_set_target_bitmap(result);
      al_clear_to_color(ALLEGRO_COLOR{0, 0, 0, 0});

      al_lock_bitmap(result, ALLEGRO_PIXEL_FORMAT_ANY, ALLEGRO_LOCK_WRITEONLY);

      for (int y=0; y<height; y++)
      {
         for (int x=0; x<width; x++)
         {
            uint16_t index = indexed_bitmap.pixels[x + y * width];
            ALLEGRO_COLOR c = palette.find_al_color_by_index(index);
            al_put_pixel(x, y, c);
         }
      }

      al_unlock_bitmap(result);

      al_restore_state(&previous_state);
      return result;


  - name: draw
    parameters:
      - name: picked_id
        type: uint32_t
        default_argument: 0
      - name: font
        type: ALLEGRO_FONT*
        default_argument: nullptr
    guards:
      - al_is_primitives_addon_initialized()
    body: |
      // TODO: guard for al_draw_text

      float frame_stroke_thickness = 2.0f;
      float o = 0.5;
      ALLEGRO_COLOR frame_color_a{o, o, o, o};
      ALLEGRO_COLOR frame_color_b{0, 0, 0, o};
      ALLEGRO_COLOR text_color{1, 1, 1, 1};

      int x = 0;
      int y = 0;
      int columns = 6;
      int spacing_x = 20;
      int spacing_y = 20;
      int box_w = 18;
      int box_h = 18;

      int column = 0;
      int row = 0;

      for (auto &color : colors)
      {
         int x1 = x + spacing_x * column;
         int y1 = y + spacing_y * row;
         int x2 = x1 + box_w;
         int y2 = y1 + box_h;

         al_draw_filled_rectangle(x1, y1, x2, y2, color.al_color);
         if (font) al_draw_textf(font, text_color, x1, y1, 0, "%d", color.id);
         if (picked_id != 0 && color.id == picked_id)
         {
            float s = frame_stroke_thickness;
            al_draw_rectangle(x1-s*0, y1-s*0, x2+s*0, y2+s*0, frame_color_a, s);
            al_draw_rectangle(x1-s*1, y1-s*1, x2+s*1, y2+s*1, frame_color_b, s);
         }

         column++;
         if (column > columns)
         {
            column = 0;
            row++;
         }
      }
      return;
    body_dependency_symbols:
      - al_draw_filled_rectangle
      - al_draw_text


  - name: draw_subset
    parameters:
      - name: color_ids
        type: std::set<uint32_t>
        default_argument: "{}"
      - name: font
        type: ALLEGRO_FONT*
        default_argument: nullptr
    guards:
      - al_is_primitives_addon_initialized()
    body: |
      // TODO: guard for al_draw_text if font is provided

      float o = 0.5;
      ALLEGRO_COLOR text_color{1, 1, 1, 1};

      int x = 0;
      int y = 0;
      int columns = 99;
      int spacing_x = 20;
      int spacing_y = 20;
      int box_w = 18;
      int box_h = 18;

      int column = 0;
      int row = 0;

      for (auto &color : colors)
      {
         // Only render the color if it exists in the provided subset
         if (color_ids.find(color.id) == color_ids.end()) continue;

         int x1 = x + spacing_x * column;
         int y1 = y + spacing_y * row;
         int x2 = x1 + box_w;
         int y2 = y1 + box_h;

         al_draw_filled_rectangle(x1, y1, x2, y2, color.al_color);

         if (font)
         {
            al_draw_textf(font, text_color, x1, y1, 0, "%d", color.id);
         }

         // Layout increment only happens for items actually drawn
         column++;
         if (column > columns)
         {
            column = 0;
            row++;
         }
      }
    body_dependency_symbols:
      - al_draw_filled_rectangle
      - al_draw_text
      - std::set


  - name: find_index_by_color
    type: uint32_t
    parameters:
      - name: al_color
        type: ALLEGRO_COLOR
        default_argument: ALLEGRO_COLOR{0.5, 0.5, 0.5, 1.0}
    body: |
      for (auto &color : colors) if (color.al_color == al_color) return color.id;
      return 0;


  - name: find_al_color_by_index
    type: ALLEGRO_COLOR
    parameters:
      - name: index
        type: uint32_t
        default_argument: 0
    guards: [ (index > 0) ]
    body: |
      for (auto &color : colors) if (color.id == index) return color.al_color;
      AllegroFlare::Logger::throw_error(
         THIS_CLASS_AND_METHOD_NAME,
         "No color exists in the palette with an id of \"" + std::to_string(index) + "\"."
      );
      return ALLEGRO_COLOR{0, 0, 0, 0};
    body_dependency_symbols:
      - AllegroFlare::Logger


  - name: find_color_by_index
    type: AssetStudio::Color*
    parameters:
      - name: index
        type: uint32_t
        default_argument: 0
    guards: [ (index > 0) ]
    body: |
      for (auto &color : colors) if (color.id == index) return &color;
      AllegroFlare::Logger::throw_error(
         THIS_CLASS_AND_METHOD_NAME,
         "No color exists in the palette with an id of \"" + std::to_string(index) + "\"."
      );
      return nullptr;
    body_dependency_symbols:
      - AllegroFlare::Logger


  - name: sort_by_luminance
    body: |
      std::sort(colors.begin(), colors.end(), compare_by_luminance);
      sorting = Sorting::LUMINANCE;
      return;
    body_dependency_symbols:
      - std::sort


  - name: sort_by_id
    body: |
      std::sort(colors.begin(), colors.end(), compare_by_id);
      sorting = Sorting::ID;
      return;
    body_dependency_symbols:
      - std::sort


  - name: compare_by_luminance
    static: true
    type: bool
    parameters:
      - name: a
        type: AssetStudio::Color&
        default_argument: dummy_color
      - name: b
        type: AssetStudio::Color&
        default_argument: dummy_color
    body: |
      if (a.luminance != b.luminance) return a.luminance > b.luminance;
      return std::tie(a.al_color.r, a.al_color.g, a.al_color.b, a.al_color.a)
         > std::tie(b.al_color.r, b.al_color.g, b.al_color.b, b.al_color.a);
    body_dependency_symbols:
      - AssetStudio::Color


  - name: compare_by_id
    static: true
    type: bool
    parameters:
      - name: a
        type: AssetStudio::Color&
        default_argument: dummy_color
      - name: b
        type: AssetStudio::Color&
        default_argument: dummy_color
    body: |
      // id should always be unique. If not, there's a problem.
      return a.id > b.id;
    body_dependency_symbols:
      - AssetStudio::Color


