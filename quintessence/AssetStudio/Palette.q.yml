properties:


  - name: raw_colors
    type: std::map<ALLEGRO_COLOR, int> 
    init_with: ''

  - name: colors
    type: std::vector<AssetStudio::Color> 
    init_with: ''

  - name: sorting
    type: AssetStudio::Palette::Sorting
    init_with: Sorting::UNDEF

  - name: tags
    type: AssetStudio::Palette::PropertyTags
    init_with: PropertyTags::UNDEF

  - name: dummy_color
    type: AssetStudio::Color
    init_with: AssetStudio::Color::build(ALLEGRO_COLOR{0.5, 0.5, 0.5, 1.0})
    static: true


enums:


  - class: PropertyTags
    enumerators:
      - UNDEF
      - HAS_ALPHA


  - class: Sorting
    enumerators:
      - UNDEF
      - ID
      - LUMINANCE


methods:


  - name: build
    static: true
    type: AssetStudio::Palette
    parameters:
      - name: bitmap
        type: ALLEGRO_BITMAP*
        default_argument: nullptr
    guards: [ bitmap, al_get_current_display() ]
    body: |
      AssetStudio::Palette result;
      ALLEGRO_COLOR pixel;

      al_lock_bitmap(bitmap, ALLEGRO_PIXEL_FORMAT_ANY, ALLEGRO_LOCK_READONLY);
      int width = al_get_bitmap_width(bitmap);
      int height = al_get_bitmap_height(bitmap);

      for (int y=0; y<height; y++)
      {
         for (int x=0; x<width; x++)
         {
            pixel = al_get_pixel(bitmap, x, y);
            result.raw_colors[pixel]++;
         }
      }

      uint32_t id = 1;
      for (auto &raw_color : result.raw_colors)
      {
         result.colors.push_back(AssetStudio::Color::build(raw_color.first));
         result.colors.back().id = id;
         id++;
      }

      al_unlock_bitmap(bitmap);

      // NOTE: Palette is implicitly ordered by reverse-luminance (from the Comparison/ALLEGRO_COLOR header). You might
      // consider ordering differently.

      return result;
    body_dependency_symbols:
      - AssetStudio::Comparison::ALLEGRO_COLOR
      - std::sort


  - name: build_indexed_bitmap_and_palette
    static: true
    type: std::pair<AssetStudio::Palette, AssetStudio::IndexedBitmap>
    parameters:
      - name: bitmap
        type: ALLEGRO_BITMAP*
        default_argument: nullptr
    guards: [ bitmap, al_get_current_display() ]
    body: |
      std::pair<AssetStudio::Palette, AssetStudio::IndexedBitmap> result_;
      AssetStudio::Palette &result = result_.first;
      AssetStudio::IndexedBitmap &result_bitmap = result_.second;

      int width = al_get_bitmap_width(bitmap);
      int height = al_get_bitmap_height(bitmap);
      result_bitmap.width = width;
      result_bitmap.height = height;
      result_bitmap.pixels.resize(width * height);

      std::map<ALLEGRO_COLOR, uint16_t> color_to_index;
      uint16_t next_id = 0;

      al_lock_bitmap(bitmap, ALLEGRO_PIXEL_FORMAT_ANY, ALLEGRO_LOCK_READONLY);

      for (int y = 0; y < height; y++)
      {
         for (int x = 0; x < width; x++)
         {
            ALLEGRO_COLOR pixel = al_get_pixel(bitmap, x, y);
            
            //  Check if color exists in our temporary map
            auto it = color_to_index.find(pixel);
            if (it == color_to_index.end())
            {
                // New color
                // Assign to the next available ID
                color_to_index[pixel] = next_id;
                result_bitmap.pixels[x + y * width] = next_id;
                
                // Also store it in your palette result
                AssetStudio::Color new_color = AssetStudio::Color::build(pixel);
                new_color.id = next_id;
                result.colors.push_back(new_color);
                
                next_id++;
            }
            else
            {
                // Existing color
                // Use a known ID we already assigned
                result_bitmap.pixels[x + y * width] = it->second;
            }
            
            // Maintain initial list
            result.raw_colors[pixel]++;
         }
      }

      al_unlock_bitmap(bitmap);
      return result_;
    body_dependency_symbols:
      - AssetStudio::Comparison::ALLEGRO_COLOR
      - std::sort


  - name: draw
    parameters:
      - name: picked_id
        type: uint32_t
        default_argument: 0
    guards:
      - al_is_primitives_addon_initialized()
    body: |
      // TODO: guard for al_draw_text

      float o = 0.5;
      ALLEGRO_COLOR frame_color_a{o, o, o, o};
      ALLEGRO_COLOR frame_color_b{0, 0, 0, o};
      ALLEGRO_COLOR text_color{1, 1, 1, 1};

      int x = 0;
      int y = 0;
      int columns = 6;
      int spacing_x = 20;
      int spacing_y = 20;
      int box_w = 18;
      int box_h = 18;

      int column = 0;
      int row = 0;

      for (auto &color : colors)
      {
         int x1 = x + spacing_x * column;
         int y1 = y + spacing_y * row;
         int x2 = x1 + box_w;
         int y2 = y1 + box_h;

         al_draw_filled_rectangle(x1, y1, x2, y2, color.al_color);
         //if (font) al_draw_textf(font, text_color, x1, y1, 0, "%d", color.id);
         if (picked_id != 0 && color.id == picked_id)
         {
            al_draw_rectangle(x1-1, y1-1, x2+1, y2+1, frame_color_a, 1.0);
            al_draw_rectangle(x1-2, y1-2, x2+2, y2+2, frame_color_b, 1.0);
         }

         column++;
         if (column > columns)
         {
            column = 0;
            row++;
         }
      }
      return;
    body_dependency_symbols:
      - al_draw_filled_rectangle
      - al_draw_text


  - name: find_index_by_color
    type: uint32_t
    parameters:
      - name: al_color
        type: ALLEGRO_COLOR
        default_argument: ALLEGRO_COLOR{0.5, 0.5, 0.5, 1.0}
    body: |
      for (auto &color : colors) if (color.al_color == al_color) return color.id;
      return 0;
    body_dependency_symbols:
      - AssetStudio::Color


  - name: sort_by_luminance
    body: |
      std::sort(colors.begin(), colors.end(), compare_by_luminance);
      sorting = Sorting::LUMINANCE;
      return;
    body_dependency_symbols:
      - std::sort


  - name: sort_by_id
    body: |
      std::sort(colors.begin(), colors.end(), compare_by_id);
      sorting = Sorting::ID;
      return;
    body_dependency_symbols:
      - std::sort


  - name: compare_by_luminance
    static: true
    type: bool
    parameters:
      - name: a
        type: AssetStudio::Color&
        default_argument: dummy_color
      - name: b
        type: AssetStudio::Color&
        default_argument: dummy_color
    body: |
      if (a.luminance != b.luminance) return a.luminance > b.luminance;
      return std::tie(a.al_color.r, a.al_color.g, a.al_color.b, a.al_color.a)
         > std::tie(b.al_color.r, b.al_color.g, b.al_color.b, b.al_color.a);
    body_dependency_symbols:
      - AssetStudio::Color


  - name: compare_by_id
    static: true
    type: bool
    parameters:
      - name: a
        type: AssetStudio::Color&
        default_argument: dummy_color
      - name: b
        type: AssetStudio::Color&
        default_argument: dummy_color
    body: |
      // id should always be unique. If not, there's a problem.
      return a.id > b.id;
    body_dependency_symbols:
      - AssetStudio::Color


dependencies:


  - symbol: ALLEGRO_BITMAP
    headers: [ allegro5/allegro.h ]
  - symbol: ALLEGRO_COLOR
    headers: [ allegro5/allegro.h ]
  - symbol: AssetStudio::Palette
    headers: [ AssetStudio/Palette.hpp ]
  - symbol: AssetStudio::Palette::PropertyTags
    headers: [ AssetStudio/Palette.hpp ]
  - symbol: AssetStudio::Comparison::ALLEGRO_COLOR
    headers: [ AssetStudio/Comparison/ALLEGRO_COLOR.hpp ]
  - symbol: al_draw_filled_rectangle
    headers: [ allegro5/allegro_primitives.h ]
  - symbol: AssetStudio::Color
    headers: [ AssetStudio/Color.hpp ]
  - symbol: std::sort
    headers: [ algorithm ]
  - symbol: AssetStudio::Palette::Sorting
