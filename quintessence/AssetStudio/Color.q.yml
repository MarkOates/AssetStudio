properties:


  - name: id
    type: uint32_t
    init_with: 0
    exposed: true

  - name: al_color
    type: ALLEGRO_COLOR
    init_with: ALLEGRO_COLOR{0.5, 0.5, 0.5, 1.0}
    exposed: true

  - name: luminance
    type: float
    init_with: 0.0f
    exposed: true

  - name: hue
    type: float
    init_with: 0.0f
    exposed: true

  - name: saturation
    type: float
    init_with: 0.0f
    exposed: true

  - name: lightness
    type: float
    init_with: 0.0f
    exposed: true

  - name: chroma
    type: float
    init_with: 0.0f
    exposed: true


methods:


  - name: build
    static: true
    type: AssetStudio::Color
    parameters:
      - name: al_color
        type: ALLEGRO_COLOR
        default_argument: ALLEGRO_COLOR{0.5, 0.5, 0.5, 1.0}
    body: |
      AssetStudio::Color result;
      result.al_color = al_color;
      result.luminance = calculate_luminance(al_color);
      std::tie(result.hue, result.saturation, result.lightness) = calculate_hue_saturation_lightness(al_color);
      result.chroma = calculate_chroma(al_color);
      return result;


  - name: multiply_rgb
    parameters:
      - name: multiplier
        type: float
        default_argument: 1.0f
    body: |
      *this = build(ALLEGRO_COLOR{
         al_color.r * multiplier,
         al_color.g * multiplier,
         al_color.b * multiplier,
         al_color.a
      });
      return;


  - name: multiply_saturation
    type: void
    author: Gemini
    parameters:
      - name: multiplier
        type: float
        default_argument: 1.0f
    body: |
      // Calculate and clamp new saturation (0.0 - 1.0)
      float new_sat = this->saturation * multiplier;
      if (new_sat < 0.0f) new_sat = 0.0f;
      if (new_sat > 1.0f) new_sat = 1.0f;

      // Convert HSL back to ALLEGRO_COLOR
      ALLEGRO_COLOR new_al_color;
      al_color_hsl_to_rgb(this->hue, new_sat, this->lightness, 
                          &new_al_color.r, &new_al_color.g, &new_al_color.b);
      new_al_color.a = this->al_color.a;

      // Rebuild the object
      *this = build(new_al_color);
    body_dependency_symbols:
      - al_color_hsl_to_rgb


  - name: rotate_hue
    type: void
    author: Gemini
    parameters:
      - name: unit_offset
        type: float
        default_argument: 0.0f
    body: |
      // Calculate new hue (0.0 - 360.0)
      float new_hue = std::fmod(this->hue + (unit_offset * 360.0f), 360.0f);
      if (new_hue < 0.0f) new_hue += 360.0f;

      // Convert HSL back to ALLEGRO_COLOR
      ALLEGRO_COLOR new_al_color;
      al_color_hsl_to_rgb(new_hue, this->saturation, this->lightness, 
                          &new_al_color.r, &new_al_color.g, &new_al_color.b);
      new_al_color.a = this->al_color.a;

      // Rebuild the object
      *this = build(new_al_color);
    body_dependency_symbols:
      - al_color_hsl_to_rgb
      - std::fmod


  - name: calculate_luminance
    static: true
    type: float
    parameters:
      - name: al_color
        type: ALLEGRO_COLOR
        default_argument: ALLEGRO_COLOR{0.5, 0.5, 0.5, 1.0}
    body: |
      return 0.299 * al_color.r
           + 0.587 * al_color.g
           + 0.114 * al_color.b;


  - name: calculate_hue_saturation_lightness
    static: true
    type: std::tuple<float, float, float>
    parameters:
      - name: al_color
        type: ALLEGRO_COLOR
        default_argument: ALLEGRO_COLOR{0.5, 0.5, 0.5, 1.0}
    body: |
      float h, s, l;
      al_color_rgb_to_hsl(al_color.r, al_color.g, al_color.b, &h, &s, &l);
      return {h, s, l};
    body_dependency_symbols:
      - al_color_rgb_to_hsl


  - name: calculate_chroma
    static: true
    type: float
    parameters:
      - name: al_color
        type: ALLEGRO_COLOR
        default_argument: ALLEGRO_COLOR{0.5, 0.5, 0.5, 1.0}
    body: |
      float max_val = std::max({al_color.r, al_color.g, al_color.b});
      float min_val = std::min({al_color.r, al_color.g, al_color.b});
      return max_val - min_val;
    body_dependency_symbols:
      - std::min
      - std::max


dependencies:


  - symbol: ALLEGRO_COLOR
    headers: [ allegro5/allegro.h ]
  - symbol: al_color_rgb_to_hsl
    headers: [ allegro5/allegro_color.h ]
  - symbol: AssetStudio::Color
    headers: [ AssetStudio/Color.hpp ]
  - symbol: al_color_hsl_to_rgb
    headers: [ allegro5/allegro_color.h ]
  - symbol: std::fmod
    headers: [ cmath ]


